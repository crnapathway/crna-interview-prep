var PROFILE_QUESTION_BANK = {
  low_gpa: ["Your GPA is on the lower end. How do you address that, and what does it tell us about your ability to handle graduate-level coursework?", "Walk us through your academic history. Is your GPA an accurate reflection of your ability?", "Some programs have GPA cutoffs. How do you make the case for yourself when your numbers are not as strong as other candidates?"],

var PROFILE_TIPS = {
  low_gpa: ["Do not apologize for your GPA and do not ignore it. Acknowledge it directly, explain the context honestly, and pivot to evidence that the issue is behind you. A defensive answer is worse than a low number.", "Lead with what your GPA does not capture - your science GPA, your last 60 credits, your CCRN, your clinical performance. Let the committee see the full picture without you having to minimize anything.", "If your GPA reflects a real period of struggle, say so. Programs respect honesty. What they do not respect is a candidate who acts like a 2.9 is fine with no explanation."],
  academic_recovery: ["This is actually a strength if you frame it right. An upward trend shows self-awareness, discipline, and the ability to course-correct. Lead with what changed, not with an apology for what came before.", "Name the specific numbers. 'My last 60 credits were a 3.6' is more powerful than 'I improved over time.' Specificity converts a weakness into a data point.", "Connect the turnaround to something real - a shift in maturity, a change in circumstances, a decision to take school seriously. The story matters as much as the numbers."],
  short_icu: ["You cannot add months before the interview, so focus on what you can control: depth over duration. Name the acuity, the procedures, the complexity of cases you have managed independently.", "Acknowledge the shorter timeline directly if it comes up. Then pivot to what you have done with that time. A candidate with 14 months in a CVICU who has managed ECMO patients has a stronger case than someone with 3 years on a step-down.", "If you are working toward a longer timeline before applying, say so. Committees respect candidates who are honest about pacing themselves."],
  long_icu: ["The concern here is not your experience - it is whether you can shift from expert practitioner to student. Address that directly. Talk about how you have stayed intellectually engaged, sought out new learning, and prepared for academic rigor.", "Do not assume your experience speaks for itself. A candidate with 8 years of ICU needs to show the committee they are still hungry, still growing, and ready to be coached again.", "If you have taken any recent coursework or certifications, mention them. They signal that the academic transition is not going to be a shock."],
  no_ccrn: ["If you are working toward your CCRN, say so and give a timeline. If you are not eligible yet, explain why. Do not pretend the question will not come up.", "The CCRN signals commitment to the specialty. Without it, your other credentials need to carry more weight. Lean harder into acuity, procedures, and clinical complexity."],
  no_shadowing: ["If you have had informal exposure to anesthesia - watching a case, talking with CRNAs in your facility - that counts. Name it specifically.", "If you genuinely have not shadowed, be honest and have a plan. 'I am scheduled to shadow next month' is better than deflecting. Programs want to know you have done something to confirm this is the right path."]
};
var CATEGORY_CONTEXT = {
  behavioral: "These questions are about what you actually did, not what you would do. Have a real story ready for each one.",
  motivation: "They have heard every version of 'I love anesthesia.' What they want is honesty, specificity, and proof you understand what you are walking into.",
  selfassessment: "Self-awareness is one of the traits programs value most. Candidates who dodge weakness questions or give non-answers stand out for the wrong reasons.",
  clinical: "Your ICU background is your primary credential at this point. Be specific about acuity, procedures, and what you have managed independently.",
  situational: "Most of these have a right answer. It usually involves patient safety, honesty, and professional accountability. Think out loud.",
  questions: "The questions you ask at the end of an interview tell programs a lot about how seriously you have prepared and how you think.",
  profile: "These questions are based on your profile. They are the ones a committee is most likely to ask you specifically. Practice them until they feel natural, not rehearsed."

var TIPS = {
  behavioral: ["Tell them the actual situation - unit, patient type, what was at stake. 'A really sick patient' is not a clinical situation. CVICU post-op with tamponade physiology is.", "Say what you did, not what the team did. Committees are evaluating you. Walk through your thinking and your specific actions, not a group effort.", "Pick something real. A minor inconvenience is not a failure. Own the mistake clearly and spend more time on what changed after than on what went wrong.", "Walk them through how you reasoned it out, not just what you decided. The reasoning is what they are actually evaluating.", "You do not need a formal title to show leadership. Taking initiative with a difficult family, speaking up in a code, or precepting counts. Pick the story that shows you stepped up when it mattered.", "This one is about whether you can hold a position professionally without becoming a problem. Show you can advocate for what you believe without needing everyone to agree with you.", "Be specific about what your role actually was. Did you lead, follow, coordinate, or step in when someone else dropped the ball? Vague teamwork answers all sound the same.", "Walk through your clinical reasoning step by step. They want to see how you think when things are moving fast, not just that it worked out."],
  motivation: ["If you cannot tie your answer to a specific moment or person that shifted your thinking, keep working on it. 'I have always been interested in anesthesia' is not an answer.", "Look up the program before you walk in. Know their clinical model, board pass rates, and affiliated sites. Saying something generic about a great reputation tells them you did not do your homework.", "Answer this honestly. Rural practice, independent practice, academia - programs respect candidates who have actually thought about where they are going. Vague answers about career growth do not land.", "Programs know the financial hit is real. They want to know you have thought it through, talked to people who have done it, and made a plan. Do not minimize it.", "Know the program's accreditation status, clinical model, and anything you can find about outcomes. If you can name something specific you learned from a current student, even better.", "Do not assume they will connect the dots between ICU nursing and anesthesia on your behalf. Name the skills directly: hemodynamic management, vasoactive drips, vent management, invasive line placement.", "They want to see that you are not waiting to get accepted to start preparing. If you have been reviewing pharmacology, brushing up on anatomy, or reading about gas laws, say so.", "Do not answer this with personality traits. Tell them what clinical experience, patient population, or specific background you bring that the next candidate might not have."],
  selfassessment: ["Saying you work too hard or care too much is not a weakness. Pick something real - test anxiety, difficulty delegating, a knowledge gap you are working on - and explain what you are doing about it.", "They are not looking for perfection. They want to know you can identify a real challenge and that you have thought about how to manage it in a demanding program.", "Connect it directly to what CRNA school actually requires. Composure under pressure, independent decision-making, attention to detail in high-stakes situations. Then give a clinical example.", "Your definition of success should extend beyond yourself. Patient outcomes, cohort performance, being the kind of provider your team can rely on. It shows you are thinking past the credential.", "Name something specific. A certification you pursued, a new clinical skill you sought out, a shift in how you communicate with attendings. 'Personal growth' without a specific example means nothing.", "Answer this the way your actual colleagues would, not the most flattering version you can construct. Committees can usually tell when someone is performing versus being honest.", "Talk about what you bring to the people around you, not just your own abilities. Programs are building a cohort, not just admitting individuals."],
  clinical: ["Name the drips, the devices, the diagnoses. Say IABP, CRRT, ECMO, pressors, paralytic infusions. Generic descriptions of 'critical patients' do not differentiate you from anyone else in that room.", "Show your progression. What you can manage now versus what overwhelmed you in year one. Programs want to see that you have developed clinical judgment, not just logged hours.", "Describe your actual shift. Hemodynamic monitoring, vent management, drip titration, procedures, rounding with attendings, charge responsibilities if applicable. Make it real.", "Research this before the interview. It is a specific question about their program and the answer is usually on their website or available from current students. Not knowing it is a missed opportunity.", "Be straightforward. If residents compete for lines at your future clinical sites, say so and explain how you have maximized your own exposure anyway. Direct answers build more credibility than polished ones.", "Make the connection explicit. Your experience managing a hemodynamically unstable post-op patient directly translates to what you will do in the OR. Do not assume the committee will make that leap for you.", "Higher acuity and more complex management makes a stronger case. Post-cardiac surgery, trauma, septic shock, ECMO patients - the more independently you have managed cases like these, the better your preparation argument."],
  situational: ["Take the feedback professionally, even if you think you are right. Patient safety and professional humility matter more than being correct in that moment. Show you can receive criticism without getting defensive.", "Give them actual strategies, not a personality trait. Exercise, debriefing after tough cases, separating work from home. If you just say you stay calm, they will not believe you.", "Think about what makes someone successful in a high-pressure graduate clinical program. Self-awareness, coachability, and composure under stress matter more than any single skill.", "Report it. There is no gray area here and committees want to see that you know it without hedging. Walk through the professional and ethical obligation clearly.", "Express your concern directly and professionally, seek clarification, and escalate through the right channels if needed. Silent compliance and open insubordination are both wrong answers.", "Disclose immediately, assess the patient, notify the team, and document. Do not skip steps or soften the sequence. Programs want to see that patient safety and transparency are your default, not your backup plan."],
